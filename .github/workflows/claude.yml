name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: >
            Bash(git *),
            Bash(gh *),
            Bash(npm *),
            Bash(node *),
            Bash(ls *),
            Bash(cat *),
            Bash(mkdir *),
            Bash(cp *),
            Bash(mv *),
            Bash(rm *),
            Bash(echo *),
            Bash(grep *),
            Bash(find *),
            Bash(sed *),
            Bash(awk *),
            Read,
            Write,
            Edit,
            Glob,
            Grep
          timeout_minutes: "60"
          custom_instructions: |
            When you push changes to a branch, you MUST create a PR and enable auto-merge:
            1. Create the PR: gh pr create --title "<title>" --body "<body>" --base main
            2. Enable auto-merge immediately: gh pr merge --auto --squash --delete-branch
            Do not just leave a "Create a PR" link — actually run both commands via Bash.
