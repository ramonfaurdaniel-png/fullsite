name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-6
          allowed_tools: >
            Bash(git *),
            Bash(npm *),
            Bash(node *),
            Bash(ls *),
            Bash(cat *),
            Bash(mkdir *),
            Bash(cp *),
            Bash(mv *),
            Bash(rm *),
            Bash(echo *),
            Bash(grep *),
            Bash(find *),
            Bash(sed *),
            Bash(awk *),
            Read,
            Write,
            Edit,
            Glob,
            Grep
          timeout_minutes: "60"
          custom_instructions: |
            After committing and pushing your changes, your job is done.
            Do NOT try to create PRs or run gh commands — the workflow handles that automatically after you finish.

      - name: Auto-create PR and enable auto-merge
        if: github.event_name == 'issue_comment' || github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git ls-remote --heads origin 'claude/*' | sort -t'/' -k3 -r | head -1 | awk '{print $2}' | sed 's|refs/heads/||')
          if [ -z "$BRANCH" ]; then
            echo "No claude/* branch found, skipping PR creation"
            exit 0
          fi
          echo "Found branch: $BRANCH"
          EXISTING_PR=$(gh pr list --repo ${{ github.repository }} --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists for $BRANCH"
          else
            PR_URL=$(gh pr create \
              --repo ${{ github.repository }} \
              --head "$BRANCH" \
              --base main \
              --title "$(git log origin/$BRANCH --not origin/main --pretty=format:'%s' | head -1)" \
              --body "Automated PR from Claude Code Action — branch \`$BRANCH\`")
            echo "Created PR: $PR_URL"
            EXISTING_PR=$(echo "$PR_URL" | grep -o '[0-9]*$')
          fi
          gh pr merge $EXISTING_PR \
            --repo ${{ github.repository }} \
            --squash --delete-branch \
            && echo "Merged PR #$EXISTING_PR via squash" \
            || echo "Merge could not be completed (may already be merged)"
